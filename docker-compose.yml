services:
  # Main Bot Service
  bot:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: bungo-bot
    restart: unless-stopped
    stop_grace_period: 30s
    environment:
      # Override Redis URL to use Docker service
      - REDIS_URL=redis://redis:6379
    env_file:
      - .env
    ports:
      - "3112:3112" # API Server
    depends_on:
      redis:
        condition: service_healthy
    volumes:
      - bot-data:/opt/lavamusic/data
      - bot-logs:/opt/lavamusic/logs
      # PlayerData files - bind mounts for real-time sync
      - ./playerData-[1b] BuNgo Bot Music.json:/opt/lavamusic/playerData-[1b] BuNgo Bot Music.json
      - ./playerData-[2b] BuNgo Bot Music.json:/opt/lavamusic/playerData-[2b] BuNgo Bot Music.json
      - ./playerData-[3b] BuNgo Bot Music.json:/opt/lavamusic/playerData-[3b] BuNgo Bot Music.json
      - ./playerData-[4b] BuNgo Bot Music.json:/opt/lavamusic/playerData-[4b] BuNgo Bot Music.json
      - ./playerData-[5b] BuNgo Bot Music.json:/opt/lavamusic/playerData-[5b] BuNgo Bot Music.json
      - ./playerData-[6b] BuNgo Bot Music.json:/opt/lavamusic/playerData-[6b] BuNgo Bot Music.json
      - ./playerData-[7b] BuNgo Bot Music.json:/opt/lavamusic/playerData-[7b] BuNgo Bot Music.json
      - ./playerData-[8b] BuNgo Bot Music.json:/opt/lavamusic/playerData-[8b] BuNgo Bot Music.json
      - ./playerData-[9b] BuNgo Bot Music.json:/opt/lavamusic/playerData-[9b] BuNgo Bot Music.json
      - ./playerData-[10b] BuNgo Bot Music.json:/opt/lavamusic/playerData-[10b] BuNgo Bot Music.json
      - ./playerData-[11b] BuNgo Bot Music.json:/opt/lavamusic/playerData-[11b] BuNgo Bot Music.json
      - ./playerData-[12b] BuNgo Bot Music.json:/opt/lavamusic/playerData-[12b] BuNgo Bot Music.json
      - ./playerData-[13b] BuNgo Bot Music.json:/opt/lavamusic/playerData-[13b] BuNgo Bot Music.json
      - ./playerData-[14b] BuNgo Bot Music.json:/opt/lavamusic/playerData-[14b] BuNgo Bot Music.json
      - ./playerData-[15b] BuNgo Bot Music.json:/opt/lavamusic/playerData-[15b] BuNgo Bot Music.json
      - ./playerData-[100b] BuNgo Bot Music.json:/opt/lavamusic/playerData-[100b] BuNgo Bot Music.json
      - ./playerData-[101b] BuNgo Bot Music.json:/opt/lavamusic/playerData-[101b] BuNgo Bot Music.json
      - ./playerData-[102b] BuNgo Bot Music.json:/opt/lavamusic/playerData-[102b] BuNgo Bot Music.json
      - ./playerData.json:/opt/lavamusic/playerData.json
      # Session data for session persistence across restarts
      - ./sessions-map.json:/opt/lavamusic/sessions-map.json
    networks:
      - bot-network
    extra_hosts:
      - "host.docker.internal:host-gateway"
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "require('http').get('http://localhost:3112/health', (r) => {process.exit(r.statusCode === 200 ? 0 : 1)})",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  # Dashboard Service (Next.js)
  dashboard:
    build:
      context: ./dashboard
      dockerfile: Dockerfile
      args:
        # Map root .env variables to Next.js build args
        # Root .env uses API_PORT, DISCORD_CLIENT_ID, DASHBOARD_URL (without NEXT_PUBLIC_ prefix)
        - NEXT_PUBLIC_API_URL=http://bot:${API_PORT:-3002}
        - NEXT_PUBLIC_WS_URL=http://bot:${API_PORT:-3002}
        - NEXT_PUBLIC_DISCORD_CLIENT_ID=${DISCORD_CLIENT_ID}
        - DISCORD_CLIENT_SECRET=${DISCORD_CLIENT_SECRET}
        - NEXTAUTH_URL=${DASHBOARD_URL}
        - NEXTAUTH_SECRET=${JWT_SECRET}
        - NEXT_PUBLIC_DASHBOARD_URL=${DASHBOARD_URL}
        - NODE_ENV=production
    container_name: bungo-dashboard
    restart: unless-stopped
    environment:
      - NODE_ENV=production
    env_file:
      - ./dashboard/.env
    ports:
      - "20082:20082" # Next.js Dashboard
    networks:
      - bot-network
    healthcheck:
      test:
        [
          "CMD",
          "wget",
          "--no-verbose",
          "--tries=1",
          "--spider",
          "http://localhost:20082",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  # Redis Service (for caching)
  redis:
    image: redis:8-alpine
    container_name: bungo-redis
    restart: unless-stopped
    ports:
      - "6379"
    volumes:
      - redis-data:/data
    networks:
      - bot-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    command: redis-server --appendonly yes

networks:
  bot-network:
    name: bungo-bot-network
    driver: bridge

volumes:
  redis-data:
    name: bungo-redis-data
  bot-data:
    name: bungo-bot-data
  bot-logs:
    name: bungo-bot-logs
